services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: financeboard
    ports:
      - "5432:5432"
    volumes:
      - financeboard_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financeboard"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  financeboard_pg_data:
